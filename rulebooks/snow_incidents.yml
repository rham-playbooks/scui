---
- name: Monitor ServiceNow incidents — diagnose and raise change requests
  hosts: all
  sources:
    - servicenow.itsm.records:
        instance:
          host: "{{ SN_HOST }}"
          username: "{{ SN_USERNAME }}"
          password: "{{ SN_PASSWORD }}"
        table: incident
        interval: 10
        sysparm_query: >
          ORDERBYDESCsys_updated_on^ORDERBYDESCsys_id
        filters:
          - ansible.eda.json_filter:
          - ansible.eda.normalize_keys:
  rules:
    - name: Run diagnostics on Earth Communications Array
      condition: event.state is defined and event.state == '1' and event.diagnostics_report is not defined
      throttle:
        once_within: 10 minutes
        group_by_attributes:
          - sys_id
      action:
        run_job_template:
          name: "Solar Storm — Diagnose Earth Comms"
          organization: SpaceShip
          post_events: true
          job_args:
            extra_vars:
              incident_sys_id: "{{ event.sys_id | default('') }}"
              incident_number: "{{ event.number | default('') }}"

    - name: Raise change request after diagnostics confirm fault
      condition: event.diagnostics_report is defined and event.icmp_blocked is defined and event.icmp_blocked == true
      throttle:
        once_within: 10 minutes
        group_by_attributes:
          - incident_sys_id
      action:
        run_job_template:
          name: "Solar Storm — Raise Change Request"
          organization: SpaceShip
          job_args:
            extra_vars:
              incident_sys_id: "{{ event.incident_sys_id | default('') }}"
              incident_number: "{{ event.incident_number | default('') }}"
              diagnostics_report: "{{ event.diagnostics_report | default('') }}"
