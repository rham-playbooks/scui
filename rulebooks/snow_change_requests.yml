---
- name: Listen for ServiceNow change requests set to Implement
  hosts: all
  sources:
    - servicenow.itsm.records:
        instance:
          host: "{{ SN_HOST }}"
          username: "{{ SN_USERNAME }}"
          password: "{{ SN_PASSWORD }}"
        table: change_request
        interval: 10
        sysparm_query: >
          ORDERBYDESCsys_updated_on^ORDERBYDESCsys_id
        filters:
          - ansible.eda.json_filter:
          - ansible.eda.normalize_keys:
  rules:
    - name: Run implementation plan when change is set to Implement
      throttle:
        once_within: 10 minutes
        group_by_attributes:
          - sys_id
      condition: event.state == '-1'
      action:
        run_job_template:
          name: "Run Implementation Plan from Change Request"
          organization: SpaceShip
          job_args:
            extra_vars:
              implementation_plan: "{{ event.implementation_plan | default('') }}"
              change_sys_id: "{{ event.sys_id | default('') }}"
              change_number: "{{ event.number | default('') }}"
              incident_sys_id: "{{ event.parent | default('') }}"
