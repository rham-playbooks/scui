<!DOCTYPE html>
<html lang="en">
<head>

<body>
	<div id="page-container" class="page-container">
		<div id="audio-consent" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:10000;">
			<button id="enable-audio" style="background:#e00;color:#fff;border:0;border-radius:8px;padding:12px 18px;font-size:16px;cursor:pointer;">Start</button>
		</div>
		<header></header>

		<div class="media-bg">
			<div class="video-wrapper">
				<video id="backgroundVideo" autoplay loop muted playsinline preload="auto" class="background-video">
	            	<source id="videoSource" src="assets/video/home.mp4" type="video/mp4">
				</video>
				<video id="backgroundVideo2" autoplay loop muted playsinline preload="auto" class="background-video" style="opacity:0">
	            	<source id="videoSource2" src="assets/video/home.mp4" type="video/mp4">
				</video>
			</div>
		</div>
	</div>

	<script src="assets/js/gsap.min.js"></script>
	<script src="assets/js/main.js?ver=2.0"></script>
