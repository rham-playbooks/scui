<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="x-ua-compatible" content="ie=edge">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<link rel="icon" type="image/png" href="assets/img/favicon.png">
<title>Red Hat - Telco</title>
<link rel="stylesheet" href="assets/css/style.css?ver=1.1">
</head>

<body>
	<div id="page-container" class="page-container">
		<div id="audio-consent" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:10000;">
			<button id="enable-audio" style="background:#e00;color:#fff;border:0;border-radius:8px;padding:12px 18px;font-size:16px;cursor:pointer;">Start</button>
		</div>
		<header>
			<div class="nav-wrapper">
				<div class="nav-wrap">
				    <button data-video="assets/video/home.mp4" data-aap-jt="20" data-scenario="engine_failure" class="change-video">Engine Failure <br> (VM Shutdown)</button>
                    <button data-video="assets/video/home.mp4" data-aap-jt="" data-scenario="solar_storm" class="change-video">Solar Storm<br> (Network Outage)</button>
                    <button data-video="assets/video/hybrid-cloud.mp4" data-aap-jt="36" data-audio="shields_down" data-scenario="shields_down" class="change-video">Shields Down<br> (Selinux Down)</button>
				    <button data-video="assets/video/home.mp4" data-aap-jt="17" data-scenario="docking_refused" class="change-video">Docking Refused<br> (Certificate Expired)</button>
				</div>

				<div class="auto-wrap">
					<button data-video="assets/video/security.mp4" class="auto-video"></button>
				</div>
			</div>
		</header>

		<div class="media-bg">
			<div class="video-wrapper">
				<video id="backgroundVideo" autoplay loop muted playsinline preload="auto" class="background-video">
	            	<source id="videoSource" src="assets/video/home.mp4" type="video/mp4">
				</video>
				<video id="backgroundVideo2" autoplay loop muted playsinline preload="auto" class="background-video" style="opacity:0">
	            	<source id="videoSource2" src="assets/video/home.mp4" type="video/mp4">
				</video>
			</div>
		</div>
	</div>

	<script src="assets/js/gsap.min.js"></script>
	<script src="assets/js/main.js?ver=1.5"></script>
</body>
</html>
