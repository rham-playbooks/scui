---
- name: Install Podman on EL
  ansible.builtin.package:
    name: "{{ podman_packages_el }}"
    state: present
  when: ansible_facts['os_family'] == 'RedHat'

- name: Install Podman on Debian/Ubuntu
  ansible.builtin.package:
    name: "{{ podman_packages_debian }}"
    state: present
  when: ansible_facts['os_family'] == 'Debian'

- name: Install podman-quadlet on EL (required for Quadlet)
  ansible.builtin.package:
    name: podman-quadlet
    state: present
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - deployment_mode == 'quadlet'

- name: Decide plain systemd fallback for EL10 when quadlet selected
  ansible.builtin.set_fact:
    use_plain_systemd: true
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - (ansible_facts['distribution_major_version'] | int) >= 10
    - deployment_mode == 'quadlet'

- name: Create build context directory on remote
  ansible.builtin.file:
    path: /opt/scui
    state: directory
    mode: '0755'

- name: Ensure setup subdirectory exists in context
  ansible.builtin.file:
    path: /opt/scui/setup
    state: directory
    mode: '0755'

- name: Sync site files to remote build context (build mode only)
  ansible.posix.synchronize:
    src: "{{ site_context_dir }}/"
    dest: /opt/scui/
    delete: yes
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=setup/roles"
  when: image_ref | length == 0

- name: Ensure Containerfile is present in context (build mode only)
  ansible.builtin.copy:
    src: "{{ containerfile_path }}"
    dest: /opt/scui/Containerfile
    mode: '0644'
  when: image_ref | length == 0

- name: Ensure nginx template is present in context (build mode only)
  ansible.builtin.copy:
    src: "{{ site_context_dir }}/setup/default.conf.template"
    dest: /opt/scui/setup/default.conf.template
    mode: '0644'
  when: image_ref | length == 0

- name: Build image (local build mode)
  containers.podman.podman_image:
    name: "{{ image_name }}"
    path: /opt/scui
  when: image_ref | length == 0

- name: Pull image (registry mode)
  containers.podman.podman_image:
    name: "{{ image_ref }}"
    state: present
  when: image_ref | length > 0

- name: Ensure old container is absent
  containers.podman.podman_container:
    name: "{{ container_name }}"
    state: absent

- name: Run container (direct mode)
  containers.podman.podman_container:
    name: "{{ container_name }}"
    image: "{{ (image_ref | length > 0) | ternary(image_ref, image_name) }}"
    state: started
    restart_policy: always
    publish:
      - "{{ host_http_port }}:80"
      - "{{ host_https_port }}:443"
    log_driver: k8s-file
    log_options:
      - max-size=10m
      - max-file=5
    volume:
      - "{{ tls_cert_src }}:/etc/ssl/certs/site.crt:ro"
      - "{{ tls_key_src }}:/etc/ssl/private/site.key:ro"
    env:
      AAP_BASE_URL: "{{ aap_base_url | default('') }}"
      AAP_BEARER_TOKEN: "{{ aap_bearer_token | default('') }}"
      API_CLIENT_BEARER_TOKEN: "{{ api_client_bearer_token | default('') }}"
  when: deployment_mode == 'container'

- name: Ensure quadlet directory exists
  ansible.builtin.file:
    path: /etc/containers/systemd
    state: directory
    mode: '0755'
  when:
    - deployment_mode == 'quadlet'
    - not (use_plain_systemd | default(false))

- name: Install quadlet unit
  ansible.builtin.template:
    src: scui-container.container.j2
    dest: "/etc/containers/systemd/{{ container_name }}.container"
    mode: '0644'
  when:
    - deployment_mode == 'quadlet'
    - not (use_plain_systemd | default(false))

- name: Reload systemd and enable service
  ansible.builtin.shell: |
    systemctl daemon-reload
    systemctl enable --now {{ container_name }}.service
  args:
    executable: /bin/bash
  when:
    - deployment_mode == 'quadlet'
    - not (use_plain_systemd | default(false))

- name: Install plain systemd service for Podman (EL10 fallback)
  ansible.builtin.template:
    src: scui-nginx.service.j2
    dest: /etc/systemd/system/{{ container_name }}.service
    mode: '0644'
  when:
    - use_plain_systemd | default(false)

- name: Reload systemd and enable plain service (EL10 fallback)
  ansible.builtin.shell: |
    systemctl daemon-reload
    systemctl enable --now {{ container_name }}.service
  args:
    executable: /bin/bash
  when:
    - use_plain_systemd | default(false)

- name: Configure journald size/retention caps
  ansible.builtin.blockinfile:
    path: /etc/systemd/journald.conf.d/scui-logs.conf
    create: true
    block: |
      [Journal]
      SystemMaxUse=500M
      SystemMaxFileSize=100M
      MaxRetentionSec=7day
  notify: restart journald


