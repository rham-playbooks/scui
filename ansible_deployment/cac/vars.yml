---
# =============================================================================
# AAP Configuration as Code — SCUI SpaceShip Demo
# =============================================================================
# Two organizations:
#   - Break        (hidden from audience — break playbooks that cause scenarios)
#   - SpaceShip    (customer-visible — EDA detects issues and resolves them)
#
# apply.yml loads this file and runs infra.aap_configuration.dispatch
# =============================================================================

# -----------------------------------------------------------------------------
# Organizations
# -----------------------------------------------------------------------------
aap_organizations:
  - name: "Break"
    description: "Internal — scenario break playbooks (not visible to demo audience)"
  - name: "SpaceShip"
    description: "SpaceShip operations — EDA-driven detection and automated remediation"

# -----------------------------------------------------------------------------
# Custom Credential Types
# -----------------------------------------------------------------------------
controller_credential_types:
  - name: "SCUI API Token"
    description: "Bearer token for the SCUI UI control API"
    kind: "cloud"
    inputs:
      fields:
        - id: SCUI_HOST
          type: string
          label: "SCUI Host (host:port)"
        - id: SCUI_PROTOCOL
          type: string
          label: "Protocol (http or https)"
        - id: AAP_API_CLIENT_BEARER_TOKEN
          type: string
          label: "API Bearer Token"
          secret: true
      required:
        - SCUI_HOST
    injectors:
      env:
        SCUI_HOST: !unsafe "{{ SCUI_HOST }}"
        SCUI_PROTOCOL: !unsafe "{{ SCUI_PROTOCOL }}"
        AAP_API_CLIENT_BEARER_TOKEN: !unsafe "{{ AAP_API_CLIENT_BEARER_TOKEN }}"

  - name: "ServiceNow ITSM"
    description: "ServiceNow instance credentials injected as env vars"
    kind: "cloud"
    inputs:
      fields:
        - id: SN_HOST
          type: string
          label: "ServiceNow Instance URL"
        - id: SN_USERNAME
          type: string
          label: "ServiceNow Username"
        - id: SN_PASSWORD
          type: string
          label: "ServiceNow Password"
          secret: true
        - id: SN_CALLER_NAME
          type: string
          label: "ServiceNow Caller Name"
      required:
        - SN_HOST
        - SN_USERNAME
        - SN_PASSWORD
    injectors:
      env:
        SN_HOST: !unsafe "{{ SN_HOST }}"
        SN_USERNAME: !unsafe "{{ SN_USERNAME }}"
        SN_PASSWORD: !unsafe "{{ SN_PASSWORD }}"
        SN_CALLER_NAME: !unsafe "{{ SN_CALLER_NAME }}"

# -----------------------------------------------------------------------------
# Projects
# -----------------------------------------------------------------------------
controller_projects:
  - name: "SpaceShip Break Scenarios"
    description: "Playbooks that cause spaceship failures (internal use only)"
    organization: "Break"
    scm_type: "git"
    scm_url: "{{ git_repo_url }}"
    scm_branch: "main"
    scm_update_on_launch: false

  - name: "SpaceShip Automation"
    description: "EDA-triggered remediation playbooks for spaceship systems"
    organization: "SpaceShip"
    scm_type: "git"
    scm_url: "{{ git_repo_url }}"
    scm_branch: "main"
    scm_update_on_launch: false

# -----------------------------------------------------------------------------
# Inventories
# -----------------------------------------------------------------------------
controller_inventories:
  - name: "Break Targets"
    description: "AWS resources targeted by break scenarios"
    organization: "Break"

  - name: "SpaceShip Systems"
    description: "All spaceship infrastructure managed by remediation playbooks"
    organization: "SpaceShip"

# -----------------------------------------------------------------------------
# Hosts
# -----------------------------------------------------------------------------
controller_hosts:
  - name: "localhost"
    inventory: "Break Targets"
    variables:
      ansible_connection: local

  - name: "earth_comms"
    inventory: "Break Targets"
    variables:
      ansible_host: "{{ earth_comms_host }}"
      ansible_user: ec2-user

  - name: "localhost"
    inventory: "SpaceShip Systems"
    variables:
      ansible_connection: local

  - name: "earth_comms"
    inventory: "SpaceShip Systems"
    variables:
      ansible_host: "{{ earth_comms_host }}"
      ansible_user: ec2-user

# -----------------------------------------------------------------------------
# Credentials
# -----------------------------------------------------------------------------
controller_credentials:
  # Break org — AWS creds to stop instances
  - name: "AWS Credentials — Break"
    description: "AWS access for EC2 operations (break scenarios)"
    organization: "Break"
    credential_type: "Amazon Web Services"
    inputs:
      username: "{{ aws_access_key }}"
      password: "{{ aws_secret_key }}"

  - name: "SCUI API — Break"
    description: "Token to trigger SCUI screen state changes"
    organization: "Break"
    credential_type: "SCUI API Token"
    inputs:
      SCUI_HOST: "{{ scui_host }}"
      SCUI_PROTOCOL: "{{ scui_protocol }}"
      AAP_API_CLIENT_BEARER_TOKEN: "{{ api_client_bearer_token }}"

  # SpaceShip org — AWS creds to start instances back up
  - name: "AWS Credentials — SpaceShip"
    description: "AWS access for EC2 operations (remediation)"
    organization: "SpaceShip"
    credential_type: "Amazon Web Services"
    inputs:
      username: "{{ aws_access_key }}"
      password: "{{ aws_secret_key }}"

  - name: "SCUI API — SpaceShip"
    description: "Token to trigger SCUI screen state changes"
    organization: "SpaceShip"
    credential_type: "SCUI API Token"
    inputs:
      SCUI_HOST: "{{ scui_host }}"
      SCUI_PROTOCOL: "{{ scui_protocol }}"
      AAP_API_CLIENT_BEARER_TOKEN: "{{ api_client_bearer_token }}"

  - name: "ServiceNow — Break"
    description: "ServiceNow credentials for creating incidents and change requests"
    organization: "Break"
    credential_type: "ServiceNow ITSM"
    inputs:
      SN_HOST: "{{ sn_instance }}"
      SN_USERNAME: "{{ sn_username }}"
      SN_PASSWORD: "{{ sn_password }}"
      SN_CALLER_NAME: "{{ sn_caller_name }}"

  - name: "ServiceNow — SpaceShip"
    description: "ServiceNow credentials for resolving incidents and change requests"
    organization: "SpaceShip"
    credential_type: "ServiceNow ITSM"
    inputs:
      SN_HOST: "{{ sn_instance }}"
      SN_USERNAME: "{{ sn_username }}"
      SN_PASSWORD: "{{ sn_password }}"
      SN_CALLER_NAME: "{{ sn_caller_name }}"

  - name: "SSH Key — Break"
    description: "SSH key for connecting to demo EC2 instances"
    organization: "Break"
    credential_type: "Machine"
    inputs:
      username: ec2-user
      ssh_key_data: "{{ machine_ssh_key }}"

  - name: "SSH Key — SpaceShip"
    description: "SSH key for connecting to demo EC2 instances"
    organization: "SpaceShip"
    credential_type: "Machine"
    inputs:
      username: ec2-user
      ssh_key_data: "{{ machine_ssh_key }}"

  - name: "AAP Controller"
    description: "Token credential for EDA to launch job templates"
    organization: "SpaceShip"
    credential_type: "Red Hat Ansible Automation Platform"
    inputs:
      host: "{{ aap_hostname }}/api/controller/"
      oauth_token: "{{ aap_token }}"
      verify_ssl: "{{ aap_validate_certs | bool }}"

# -----------------------------------------------------------------------------
# Job Templates
# -----------------------------------------------------------------------------
controller_templates:
  # --- Break org (hidden) ---
  - name: "Engine Failure — Break"
    description: "Stop the Warpdrive Engine EC2 instance and trigger SCUI crisis state"
    organization: "Break"
    job_type: "run"
    project: "SpaceShip Break Scenarios"
    playbook: "playbooks/break/engine_failure.yml"
    inventory: "Break Targets"
    ask_variables_on_launch: true
    credentials:
      - "AWS Credentials — Break"
      - "SCUI API — Break"
    extra_vars:
      aws_region: "{{ aws_region }}"
      instance_id: "{{ warpdrive_engine_instance_id }}"

  - name: "Solar Storm — Break"
    description: "Block ICMP on Earth Comms, create ServiceNow incident and change request"
    organization: "Break"
    job_type: "run"
    project: "SpaceShip Break Scenarios"
    playbook: "playbooks/break/solar_storm.yml"
    inventory: "Break Targets"
    ask_variables_on_launch: true
    credentials:
      - "SSH Key — Break"
      - "SCUI API — Break"
      - "ServiceNow — Break"

  # --- SpaceShip org (visible — EDA triggers these) ---
  - name: "Engine Failure — Resolve"
    description: "Restart the Warpdrive Engine and notify SCUI of resolution"
    organization: "SpaceShip"
    job_type: "run"
    project: "SpaceShip Automation"
    playbook: "playbooks/resolve/engine_failure.yml"
    inventory: "SpaceShip Systems"
    ask_variables_on_launch: true
    credentials:
      - "AWS Credentials — SpaceShip"
      - "SCUI API — SpaceShip"
    extra_vars:
      aws_region: "{{ aws_region }}"
      instance_id: "{{ warpdrive_engine_instance_id }}"

  - name: "Solar Storm — Resolve"
    description: "Re-enable ICMP on Earth Comms, update ServiceNow, notify SCUI"
    organization: "SpaceShip"
    job_type: "run"
    project: "SpaceShip Automation"
    playbook: "playbooks/resolve/solar_storm.yml"
    inventory: "SpaceShip Systems"
    ask_variables_on_launch: true
    credentials:
      - "SSH Key — SpaceShip"
      - "SCUI API — SpaceShip"
      - "ServiceNow — SpaceShip"

# -----------------------------------------------------------------------------
# EDA — SpaceShip org
# -----------------------------------------------------------------------------
eda_projects:
  - name: "SpaceShip Event Rules"
    description: "EDA rulebooks for spaceship event monitoring and automated response"
    organization: "SpaceShip"
    scm_type: "git"
    scm_url: "{{ git_repo_url }}"
    scm_branch: "main"
    scm_update_on_launch: false
    sync: true

eda_credential_types:
  - name: "ServiceNow Environment"
    description: "Injects ServiceNow credentials as environment variables for EDA"
    inputs:
      fields:
        - id: sn_host
          type: string
          label: "ServiceNow Instance URL"
        - id: sn_username
          type: string
          label: "ServiceNow Username"
        - id: sn_password
          type: string
          label: "ServiceNow Password"
          secret: true
      required:
        - sn_host
        - sn_username
        - sn_password
    injectors:
      env:
        SN_HOST: !unsafe "{{ sn_host }}"
        SN_USERNAME: !unsafe "{{ sn_username }}"
        SN_PASSWORD: !unsafe "{{ sn_password }}"

  - name: "AWS Environment"
    description: "Injects AWS credentials as environment variables for boto3"
    inputs:
      fields:
        - id: aws_access_key_id
          type: string
          label: "AWS Access Key ID"
        - id: aws_secret_access_key
          type: string
          label: "AWS Secret Access Key"
          secret: true
        - id: aws_default_region
          type: string
          label: "AWS Default Region"
      required:
        - aws_access_key_id
        - aws_secret_access_key
    injectors:
      env:
        AWS_ACCESS_KEY_ID: !unsafe "{{ aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: !unsafe "{{ aws_secret_access_key }}"
        AWS_DEFAULT_REGION: !unsafe "{{ aws_default_region }}"

eda_credentials:
  - name: "AAP Controller"
    description: "Token for EDA to launch Controller job templates"
    organization: "SpaceShip"
    credential_type: "Red Hat Ansible Automation Platform"
    inputs:
      host: "{{ aap_hostname }}/api/controller/"
      oauth_token: "{{ aap_token }}"
      verify_ssl: "{{ aap_validate_certs }}"

  - name: "AWS SQS Access"
    description: "AWS credentials for EDA source plugins (SQS polling)"
    organization: "SpaceShip"
    credential_type: "AWS Environment"
    inputs:
      aws_access_key_id: "{{ aws_access_key }}"
      aws_secret_access_key: "{{ aws_secret_key }}"
      aws_default_region: "{{ aws_region }}"

  - name: "ServiceNow EDA"
    description: "ServiceNow credentials for EDA to poll change requests"
    organization: "SpaceShip"
    credential_type: "ServiceNow Environment"
    inputs:
      sn_host: "{{ sn_instance }}"
      sn_username: "{{ sn_username }}"
      sn_password: "{{ sn_password }}"

eda_decision_environments:
  - name: "snow-de"
    description: "Decision Environment with ServiceNow and EDA collections"
    organization: "SpaceShip"
    image_url: "{{ snow_de_image }}"

  - name: "aws-sqs-de"
    description: "Decision Environment with AWS and EDA collections for SQS event sources"
    organization: "SpaceShip"
    image_url: "{{ aws_sqs_de_image }}"

eda_rulebook_activations:
  - name: "Warpdrive Engine Monitor"
    description: "Polls SQS for CloudTrail StopInstances events on the Warpdrive Engine and triggers remediation"
    organization: "SpaceShip"
    project: "SpaceShip Event Rules"
    rulebook: "engine_failure.yml"
    decision_environment: "aws-sqs-de"
    eda_credentials:
      - "AAP Controller"
      - "AWS SQS Access"
    enabled: true

  - name: "Earth Comms Change Monitor"
    description: "Polls ServiceNow change_request table for Implement state and triggers Solar Storm resolution"
    organization: "SpaceShip"
    project: "SpaceShip Event Rules"
    rulebook: "snow_change_requests.yml"
    decision_environment: "snow-de"
    eda_credentials:
      - "AAP Controller"
      - "ServiceNow EDA"
    enabled: true
