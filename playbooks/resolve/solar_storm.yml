---
- name: "Solar Storm: Restore ICMP on Earth Comms"
  hosts: earth_comms
  become: true
  gather_facts: false

  tasks:
    - name: Pause to allow observation
      ansible.builtin.pause:
        seconds: 10

    - name: Re-enable ICMP traffic via firewalld
      ansible.posix.firewalld:
        rich_rule: 'rule protocol value="icmp" drop'
        permanent: true
        immediate: true
        state: disabled

    - name: Report
      ansible.builtin.debug:
        msg: "ICMP restored on {{ inventory_hostname }}. Ping to earth.chrislab.dev will succeed."

- name: "Solar Storm: Update ServiceNow and notify SCUI"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    scui_host: "{{ lookup('env', 'SCUI_HOST') | default('localhost:8080', true) }}"
    scui_protocol: "{{ lookup('env', 'SCUI_PROTOCOL') | default('http', true) }}"
    api_token: "{{ lookup('env', 'AAP_API_CLIENT_BEARER_TOKEN') | default('', true) }}"
    sn_host: "{{ lookup('env', 'SN_HOST') | default(omit, true) }}"
    sn_username: "{{ lookup('env', 'SN_USERNAME') | default(omit, true) }}"
    sn_password: "{{ lookup('env', 'SN_PASSWORD') | default(omit, true) }}"
    incident_sys_id: ""
    change_sys_id: ""

  tasks:
    - name: Update change request to Review
      servicenow.itsm.change_request:
        sys_id: "{{ change_sys_id }}"
        state: review
        other:
          close_code: successful
          close_notes: "ICMP restored on earth-comms by EDA automation."
      when: (change_sys_id | default('')) | length > 0

    - name: Resolve the incident
      servicenow.itsm.incident:
        sys_id: "{{ incident_sys_id }}"
        state: resolved
        close_code: "Solution provided"
        close_notes: >-
          Earth communications restored. ICMP re-enabled on earth-comms firewall.
          Automated resolution by Ansible Automation Platform via EDA.
      when: (incident_sys_id | default('')) | length > 0

    - name: Trigger SCUI resolved state
      ansible.builtin.uri:
        url: "{{ scui_protocol }}://{{ scui_host }}/api/controller/ui/home"
        method: POST
        body_format: json
        body:
          scenario: solar_storm_resolved
        headers: >-
          {{
            (api_token | length > 0)
            | ternary(
                {'Authorization': 'Bearer ' + api_token, 'Content-Type': 'application/json'},
                {'Content-Type': 'application/json'}
              )
          }}
        status_code: [200, 204]

    - name: Report
      ansible.builtin.debug:
        msg: "Earth communications restored. ServiceNow updated. SCUI notified."
